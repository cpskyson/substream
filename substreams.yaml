specVersion: v0.1.0
package:
  name: solana_graph
  version: v0.1.0
  url: https://github.com/username/solana_graph-solana-devnet
  description: Substreams module for solana_graph on Solana Devnet

imports:
  solana: ./spkg/solana-common-v0.3.3.spkg

protobuf:
  files:
    - mydata.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams/rpc
    - sf/substreams/v1
    - sf/substreams/sink
    - sf/substreams/index
    - sf/substreams/index/v1
    - instructions.proto # sol.instructions.v1 from the v0.2.0 spkg
    - transactions.proto # sol.transactions.v1 from the v0.2.0 spkg
    - google

binaries:
  default:
    type: wasm/rust-v1+wasm-bindgen-shims
    file: ./target/wasm32-unknown-unknown/release/substreams.wasm

modules:
  - name: map_filtered_transactions
    use: solana:transactions_by_programid_and_account_without_votes
    initialBlock: 444697459

  - name: map_metadata_transactions
    use: solana:transactions_by_programid_and_account_without_votes
    initialBlock: 444697459

  - name: map_token_2022_transactions
    use: solana:transactions_by_programid_and_account_without_votes
    initialBlock: 444697459

  - name: map_amm_updates
    kind: map
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_filtered_transactions
      - store: store_token_metadata
        mode: get
    output:
      type: proto:mydata.v1.MyData

  - name: store_pool_metadata
    kind: store
    updatePolicy: set
    valueType: proto:mydata.v1.Pool
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_ids
    kind: store
    updatePolicy: append
    valueType: string
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_tvl
    kind: store
    updatePolicy: set
    valueType: float64
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_lp_supply
    kind: store
    updatePolicy: set
    valueType: float64
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_volume_1h
    kind: store
    updatePolicy: add
    valueType: float64
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_volume_a_1h
    kind: store
    updatePolicy: add
    valueType: float64
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_volume_b_1h
    kind: store
    updatePolicy: add
    valueType: float64
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_fees_1h
    kind: store
    updatePolicy: add
    valueType: float64
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_fees_a_1h
    kind: store
    updatePolicy: add
    valueType: float64
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_fees_b_1h
    kind: store
    updatePolicy: add
    valueType: float64
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_position_metadata
    kind: store
    updatePolicy: set
    valueType: proto:mydata.v1.Position
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_position_ids
    kind: store
    updatePolicy: append
    valueType: string
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_pool_position_ids
    kind: store
    updatePolicy: append
    valueType: string
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates

  - name: store_token_metadata
    kind: store
    updatePolicy: set
    valueType: string
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_metadata_transactions
      - map: map_token_2022_transactions

  - name: map_my_data
    kind: map
    inputs:
      - source: sf.substreams.v1.Clock
      - store: store_pool_metadata
        mode: get
      - store: store_pool_ids
        mode: get
      - store: store_pool_tvl
        mode: get
      - store: store_pool_volume_1h
        mode: get
      - store: store_pool_volume_a_1h
        mode: get
      - store: store_pool_volume_b_1h
        mode: get
      - store: store_pool_fees_1h
        mode: get
      - store: store_pool_fees_a_1h
        mode: get
      - store: store_pool_fees_b_1h
        mode: get
      - store: store_position_metadata
        mode: get
      - store: store_position_ids
        mode: get
      - store: store_token_metadata
        mode: get
    output:
      type: proto:mydata.v1.MyData

  - name: map_amm_priced
    kind: map
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_updates
      - store: store_pool_metadata
        mode: get
      - store: store_pool_ids
        mode: get
      - store: store_pool_lp_supply
        mode: get
      - store: store_position_metadata
        mode: get
      - store: store_position_ids
        mode: get
      - store: store_pool_position_ids
        mode: get
      - store: store_token_metadata
        mode: get
    output:
      type: proto:mydata.v1.MyData

  - name: map_pool_hourly
    kind: map
    inputs:
      - source: sf.substreams.v1.Clock
      - map: map_amm_priced
    output:
      type: proto:mydata.v1.HourlyData

network: solana-devnet

params:
  map_filtered_transactions: "program:ntV2vADY28AaTj7UjxtAyhX8fRCaSbzUfmvXnHZHFzG"
  map_metadata_transactions: "program:metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s || account:metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s"
  map_token_2022_transactions: "program:TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb || account:TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"
